services:
  mongo:
    image: mongo:7
    container_name: operas-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    
  api:
    build: .
    container_name: operas-api
    ports:
      - "17060:17060"
    environment:
      PORT: 17060
      MONGODB_URI: mongodb://mongo:27017/operas_db
    depends_on:
      - mongo

volumes:
  mongo-data:
